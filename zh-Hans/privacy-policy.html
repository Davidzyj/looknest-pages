  <h1>LookNest 隐私政策</h1>
  <p>最后更新：2026 年 6 月 26 日</p>
  <h2>概述</h2>
  <p>LookNest 是一款本地衣橱和穿搭规划 App，不需要账号，也不收集个人数据。</p>
  <h2>设备本地数据</h2>
  <p>衣橱单品、穿搭记录、语言选择和风格偏好保存在你的 iPhone 本地。LookNest 不会上传这些数据。</p>
  <h2>网络与跟踪</h2>
  <p>LookNest 不包含广告、分析、跟踪、第三方 SDK，也不会主动发起网络请求。隐私政策和支持页面只会在你点击入口后打开。</p>
  <h2>联系</h2>
